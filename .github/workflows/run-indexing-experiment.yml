---
name: Run indexing experiment

'on':
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Checked-in manifest path containing rsync URLs and container name
        required: true
        default: examples/local/scale-test/manifests/ietf-mailing-lists.sample.json
        type: string
      profile_version:
        description: Published profile version to evaluate
        required: true
        default: 0.6.0
        type: string
      runner_image_tag:
        description: Published lexonarchivebuilder-scale-test image tag
        required: false
        default: main
        type: string
      ssh_public_key:
        description: SSH public key for break-glass VM access when ssh_source_prefixes enables SSH
        required: false
        default: ''
        type: string
      ssh_source_prefixes:
        description: Optional comma-separated CIDRs allowed to SSH to the VM
        required: false
        default: ''
        type: string
      block_store_target:
        description: Block-store target selection
        required: true
        default: overlay
        type: choice
        options:
          - filesystem
          - overlay
      debug_retain_failed_vm:
        description: Retain the failed batch resource group and keep the VM allocated for break-glass investigation
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: indexing-experiment-${{ github.ref }}-${{ inputs.manifest_path }}-${{ inputs.profile_version }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate Azure OIDC configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${AZURE_LOCATION:?Repository variable AZURE_LOCATION is required}"
          : "${AZURE_CLIENT_ID:?Repository variable AZURE_CLIENT_ID is required}"
          : "${AZURE_TENANT_ID:?Repository variable AZURE_TENANT_ID is required}"
          : "${AZURE_SUBSCRIPTION_ID:?Repository variable AZURE_SUBSCRIPTION_ID is required}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare run metadata and deployment parameters
        id: prepare
        shell: bash
        env:
          MANIFEST_PATH_INPUT: ${{ inputs.manifest_path }}
          PROFILE_VERSION_INPUT: ${{ inputs.profile_version }}
          RUNNER_IMAGE_TAG_INPUT: ${{ inputs.runner_image_tag }}
          SSH_PUBLIC_KEY_INPUT: ${{ inputs.ssh_public_key }}
          SSH_SOURCE_PREFIXES_INPUT: ${{ inputs.ssh_source_prefixes }}
          BLOCK_STORE_TARGET_INPUT: ${{ inputs.block_store_target }}
          DEBUG_RETAIN_FAILED_VM_INPUT: ${{ inputs.debug_retain_failed_vm }}
        run: |
          set -euo pipefail
          source scripts/lexonarchivebuilder-hosted-workflow-common.sh

          manifest_path="$MANIFEST_PATH_INPUT"
          if [[ ! -f "$manifest_path" ]]; then
            printf 'Manifest not found: %s\n' "$manifest_path" >&2
            exit 1
          fi

          ssh_prefixes_input="$SSH_SOURCE_PREFIXES_INPUT"
          profile_version="$PROFILE_VERSION_INPUT"
          runner_image_tag="$RUNNER_IMAGE_TAG_INPUT"
          ssh_public_key="$SSH_PUBLIC_KEY_INPUT"

          hosted_workflow_validate_runner_image_tag "$runner_image_tag"

          hosted_workflow_validate_profile_version "$profile_version"

          manifest_json_minified="$(hosted_workflow_normalize_manifest_json "$manifest_path")"
          manifest_hash="$(printf '%s' "$manifest_json_minified" | sha256sum | cut -c1-10)"
          repo_hash="$(printf '%s' "$GITHUB_REPOSITORY" | sha256sum | cut -c1-6)"
          batch_suffix="$(date -u '+%Y%m%d%H%M%S')-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          container_name="$(hosted_workflow_extract_container_name "$manifest_path")"

          long_term_resource_group="lexon-exp-${manifest_hash}"
          batch_resource_group="${long_term_resource_group}-batch-${batch_suffix}"
          storage_account_name="lex${repo_hash}${manifest_hash}sa"
          vnet_name="lexon-exp-${manifest_hash}-batch-vnet-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          vm_name="lexon-exp-index-${manifest_hash}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          run_name="index-${manifest_hash}-${profile_version//./-}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          artifact_prefix="artifacts/indexing-experiment/${profile_version}/${run_name}"

          enable_ssh_access=false
          ssh_prefixes_json='[]'
          if [[ -n "$ssh_prefixes_input" ]]; then
            enable_ssh_access=true
            if [[ -z "$ssh_public_key" ]]; then
              printf 'ssh_public_key is required when ssh_source_prefixes enables SSH access\n' >&2
              exit 1
            fi
            ssh_prefixes_json="$(python3 - "$ssh_prefixes_input" <<'PY'
            import ipaddress
            import json
            import sys

            raw = sys.argv[1]
            items = [entry.strip() for entry in raw.split(',') if entry.strip()]
            if not items:
                raise SystemExit('ssh_source_prefixes must contain at least one CIDR when SSH access is enabled')

            validated = []
            for entry in items:
                if '/' not in entry:
                    raise SystemExit(f'ssh_source_prefixes entry "{entry}" must use CIDR notation')
                try:
                    validated.append(str(ipaddress.ip_network(entry, strict=False)))
                except ValueError as exc:
                    raise SystemExit(f'ssh_source_prefixes entry "{entry}" is not a valid CIDR: {exc}')

            print(json.dumps(validated))
          PY
            )"
          elif [[ -z "$ssh_public_key" ]]; then
            ssh_key_path="${RUNNER_TEMP}/lexonarchivebuilder-indexing-experiment-ssh-key"
            rm -f "$ssh_key_path" "$ssh_key_path.pub"
            ssh-keygen -q -t rsa -b 4096 -N '' -f "$ssh_key_path" >/dev/null
            ssh_public_key="$(<"${ssh_key_path}.pub")"
            rm -f "$ssh_key_path" "$ssh_key_path.pub"
          fi
          {
            echo "manifest_path=$manifest_path"
            echo "long_term_resource_group=$long_term_resource_group"
            echo "batch_resource_group=$batch_resource_group"
            echo "storage_account_name=$storage_account_name"
            echo "container_name=$container_name"
            echo "vnet_name=$vnet_name"
            echo "vm_name=$vm_name"
            echo "run_name=$run_name"
            echo "artifact_prefix=$artifact_prefix"
            echo "enable_ssh_access=$enable_ssh_access"
            echo "ssh_prefixes_json=$ssh_prefixes_json"
            echo "ssh_public_key<<__EOF__"
            printf '%s' "$ssh_public_key"
            echo "__EOF__"
          } >>"$GITHUB_OUTPUT"

      - name: Ensure long-term resource group exists
        shell: bash
        run: |
          set -euo pipefail
          az group create \
            --name '${{ steps.prepare.outputs.long_term_resource_group }}' \
            --location "$AZURE_LOCATION" \
            --tags lexon-workflow=indexing-experiment lexon-scope=long-term github-run-id="${GITHUB_RUN_ID}" github-run-attempt="${GITHUB_RUN_ATTEMPT}" >/dev/null

      - name: Deploy reusable storage
        id: storage
        shell: bash
        run: |
          set -euo pipefail
          storage_tags_json="$(python3 - "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" <<'PY'
          import json
          import sys
          print(json.dumps({
              "lexon-workflow": "indexing-experiment",
              "lexon-scope": "long-term",
              "github-run-id": sys.argv[1],
              "github-run-attempt": sys.argv[2],
          }))
          PY
          )"
          outputs_json="$(
            az deployment group create \
              --resource-group '${{ steps.prepare.outputs.long_term_resource_group }}' \
              --template-file infra/azure/experiments/storage.bicep \
              --parameters \
                location="$AZURE_LOCATION" \
                tags="$storage_tags_json" \
                storageAccountName='${{ steps.prepare.outputs.storage_account_name }}' \
                containerName='${{ steps.prepare.outputs.container_name }}' \
              --query properties.outputs \
              --output json
          )"

          python3 - "$outputs_json" >>"$GITHUB_OUTPUT" <<'PY'
          import json
          import sys

          outputs = json.loads(sys.argv[1])
          for key in ("blobEndpoint", "storageAccountName", "containerName"):
              value = outputs[key]["value"]
              print(f"{key}={value}")
          PY

      - name: Generate workflow container SAS
        shell: bash
        run: |
          set -euo pipefail
          sas_expiry="$(date -u -d '+1 day' '+%Y-%m-%dT%H:%M:%SZ')"
          sas_token="$(
            az storage container generate-sas \
              --account-name '${{ steps.storage.outputs.storageAccountName }}' \
              --name '${{ steps.storage.outputs.containerName }}' \
              --as-user \
              --auth-mode login \
              --permissions racwl \
              --expiry "$sas_expiry" \
              --https-only \
              --output tsv
          )"
          container_sas_url="${{ steps.storage.outputs.blobEndpoint }}${{ steps.storage.outputs.containerName }}?${sas_token}"
          printf '::add-mask::%s\n' "$sas_token"
          printf '::add-mask::%s\n' "$container_sas_url"
          printf 'CONTAINER_SAS_URL=%s\n' "$container_sas_url" >>"$GITHUB_ENV"

      - name: Write batch deployment parameters
        shell: bash
        env:
          MANIFEST_PATH_INPUT: ${{ steps.prepare.outputs.manifest_path }}
          PROFILE_VERSION_INPUT: ${{ inputs.profile_version }}
          RUNNER_IMAGE_TAG_INPUT: ${{ inputs.runner_image_tag }}
          BLOCK_STORE_TARGET_INPUT: ${{ inputs.block_store_target }}
          DEBUG_RETAIN_FAILED_VM_INPUT: ${{ inputs.debug_retain_failed_vm }}
          SSH_PUBLIC_KEY_INPUT: ${{ steps.prepare.outputs.ssh_public_key }}
        run: |
          set -euo pipefail
          source scripts/lexonarchivebuilder-hosted-workflow-common.sh
          manifest_json_minified="$(hosted_workflow_normalize_manifest_json "$MANIFEST_PATH_INPUT")"
          manifest_json_b64="$(printf '%s' "$manifest_json_minified" | base64 -w0)"
          runner_image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/lexonarchivebuilder-scale-test:${RUNNER_IMAGE_TAG_INPUT}"
          workload_env_file="$(
            hosted_workflow_render_indexing_workload_env_file \
              '${{ steps.prepare.outputs.run_name }}' \
              "$runner_image" \
              "$manifest_json_b64" \
              "$(base64 -w0 scripts/lexonarchivebuilder-hosted-experiment-common.sh)" \
              "$(base64 -w0 scripts/lexonarchivebuilder-indexing-experiment.sh)" \
              'datasets/block-store' \
              'datasets/block-store.replay-journal' \
              '${{ steps.prepare.outputs.artifact_prefix }}' \
              "$BLOCK_STORE_TARGET_INPUT" \
             "$DEBUG_RETAIN_FAILED_VM_INPUT" \
             "$PROFILE_VERSION_INPUT"
          )"
          python3 scripts/lexonarchivebuilder-write-deployment-parameters.py \
            --workflow-name indexing-experiment \
            --location "$AZURE_LOCATION" \
            --resource-group '${{ steps.prepare.outputs.batch_resource_group }}' \
            --vnet-name '${{ steps.prepare.outputs.vnet_name }}' \
            --storage-account-name '${{ steps.storage.outputs.storageAccountName }}' \
            --container-name '${{ steps.storage.outputs.containerName }}' \
            --container-sas-url "$CONTAINER_SAS_URL" \
            --vm-name '${{ steps.prepare.outputs.vm_name }}' \
            --ssh-public-key "$SSH_PUBLIC_KEY_INPUT" \
            --enable-public-ip '${{ steps.prepare.outputs.enable_ssh_access }}' \
            --enable-ssh-access '${{ steps.prepare.outputs.enable_ssh_access }}' \
            --ssh-source-prefixes-json '${{ steps.prepare.outputs.ssh_prefixes_json }}' \
            --workload-environment-file "$workload_env_file" \
            --workload-script-path 'infra/azure/experiments/indexing-experiment-bootstrap.sh' \
            --github-run-id "$GITHUB_RUN_ID" \
            --github-run-attempt "$GITHUB_RUN_ATTEMPT" > deployment.parameters.json

      - name: Ensure batch resource group exists
        shell: bash
        run: |
          set -euo pipefail
          az group create \
            --name '${{ steps.prepare.outputs.batch_resource_group }}' \
            --location "$AZURE_LOCATION" \
            --tags lexon-workflow=indexing-experiment lexon-scope=batch github-run-id="${GITHUB_RUN_ID}" github-run-attempt="${GITHUB_RUN_ATTEMPT}" >/dev/null

      - name: Deploy experiment runner
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          outputs_json="$(
            az deployment group create \
              --resource-group '${{ steps.prepare.outputs.batch_resource_group }}' \
              --template-file infra/azure/experiments/main.bicep \
              --parameters @deployment.parameters.json \
              --query properties.outputs \
              --output json
          )"

          python3 - "$outputs_json" >>"$GITHUB_OUTPUT" <<'PY'
          import json
          import sys

          outputs = json.loads(sys.argv[1])
          for key in ("vmName", "vmPublicIpAddress"):
              value = outputs[key]["value"]
              print(f"{key}={value}")
          PY

      - name: Wait for experiment artifact
        id: wait
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p indexing-experiment-artifact

          status_url="$(python3 - "$CONTAINER_SAS_URL" '${{ steps.prepare.outputs.artifact_prefix }}/status.json' <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit
          parts = urlsplit(sys.argv[1])
          path = f"{parts.path.rstrip('/')}/{sys.argv[2].lstrip('/')}"
          print(urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"

          for _ in $(seq 1 220); do
            if curl --fail --silent --show-error --location "$status_url" --output indexing-experiment-artifact/status.json; then
              break
            fi
            sleep 60
          done

          if [[ ! -f indexing-experiment-artifact/status.json ]]; then
            printf 'Timed out waiting for indexing experiment status artifact\n' >&2
            exit 1
          fi

          quality_url="$(python3 - "$CONTAINER_SAS_URL" '${{ steps.prepare.outputs.artifact_prefix }}/quality.json' <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit
          parts = urlsplit(sys.argv[1])
          path = f"{parts.path.rstrip('/')}/{sys.argv[2].lstrip('/')}"
          print(urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"
          summary_url="$(python3 - "$CONTAINER_SAS_URL" '${{ steps.prepare.outputs.artifact_prefix }}/summary.json' <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit
          parts = urlsplit(sys.argv[1])
          path = f"{parts.path.rstrip('/')}/{sys.argv[2].lstrip('/')}"
          print(urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"
          result_url="$(python3 - "$CONTAINER_SAS_URL" '${{ steps.prepare.outputs.artifact_prefix }}/result.json' <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit
          parts = urlsplit(sys.argv[1])
          path = f"{parts.path.rstrip('/')}/{sys.argv[2].lstrip('/')}"
          print(urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"

          curl --fail --silent --show-error --location "$quality_url" --output indexing-experiment-artifact/quality.json || true
          curl --fail --silent --show-error --location "$summary_url" --output indexing-experiment-artifact/summary.json || true
          curl --fail --silent --show-error --location "$result_url" --output indexing-experiment-artifact/result.json || true

          success_flag="$(python3 - indexing-experiment-artifact/status.json <<'PY'
          import json
          import sys
          with open(sys.argv[1], 'r', encoding='utf-8') as handle:
              print('true' if json.load(handle).get('success') else 'false')
          PY
          )"

          echo "success=$success_flag" >>"$GITHUB_OUTPUT"
          if [[ "$success_flag" != 'true' ]]; then
            printf 'Indexing experiment reported failure\n' >&2
            exit 1
          fi

      - name: Delete batch resource group
        if: ${{ always() && !(failure() && inputs.debug_retain_failed_vm) }}
        shell: bash
        run: |
          set -euo pipefail
          batch_resource_group='${{ steps.prepare.outputs.batch_resource_group }}'
          if [[ -z "$batch_resource_group" ]]; then
            printf 'Skipping batch resource-group cleanup because no batch resource group was recorded.\n' >&2
            exit 0
          fi
          az group delete \
            --name "$batch_resource_group" \
            --yes \
            --no-wait >/dev/null 2>&1 || true

      - name: Upload indexing experiment artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexing-experiment-${{ steps.prepare.outputs.run_name }}
          path: indexing-experiment-artifact
          if-no-files-found: warn

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Indexing experiment'
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Manifest | \`${{ steps.prepare.outputs.manifest_path }}\` |"
            echo "| Profile | \`${{ inputs.profile_version }}\` |"
            echo "| Long-term resource group | \`${{ steps.prepare.outputs.long_term_resource_group }}\` |"
            echo "| Batch resource group | \`${{ steps.prepare.outputs.batch_resource_group }}\` |"
            echo "| Storage account | \`${{ steps.storage.outputs.storageAccountName }}\` |"
            echo "| Container | \`${{ steps.storage.outputs.containerName }}\` |"
            echo "| VM | \`${{ steps.deploy.outputs.vmName }}\` |"
            echo "| Public IP | \`${{ steps.deploy.outputs.vmPublicIpAddress }}\` |"
            echo "| Run name | \`${{ steps.prepare.outputs.run_name }}\` |"
            echo "| Artifact prefix | \`${{ steps.prepare.outputs.artifact_prefix }}\` |"
            echo "| Debug retain failed batch RG | \`${{ inputs.debug_retain_failed_vm }}\` |"
          } >>"$GITHUB_STEP_SUMMARY"
