name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - .dockerignore
      - .gitattributes
      - .github/skills/**
      - .github/workflows/**
      - .gitignore
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - docs/**
      - examples/**
      - hooks/**
      - infra/**
      - README.md
      - scripts/**
      - test.ps1

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  spdx:
    name: SPDX header check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: bash hooks/check-spdx-headers --all

  fmt:
    name: Rust format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --check --all

  clippy:
    name: Rust lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Rust test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --locked
