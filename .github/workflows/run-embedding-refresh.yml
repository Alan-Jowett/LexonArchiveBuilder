---
name: Run embedding refresh

'on':
  workflow_dispatch:
    inputs:
      manifest_path:
        description: Checked-in manifest path containing rsync URLs and container name
        required: true
        default: examples/local/scale-test/manifests/ietf-mailing-lists.sample.json
        type: string
      runner_image_tag:
        description: Published lexonarchivebuilder-scale-test image tag
        required: false
        default: main
        type: string
      ssh_public_key:
        description: SSH public key for break-glass VM access when ssh_source_prefixes enables SSH
        required: false
        default: ''
        type: string
      ssh_source_prefixes:
        description: Optional comma-separated CIDRs allowed to SSH to the VM
        required: false
        default: ''
        type: string
      block_store_target:
        description: Block-store target selection
        required: true
        default: overlay
        type: choice
        options:
          - filesystem
          - overlay

permissions:
  contents: read
  id-token: write

concurrency:
  group: embedding-refresh-${{ github.ref }}-${{ inputs.manifest_path }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      STAPI_IMAGE: ghcr.io/substratusai/stapi:v2.2.2-3

    steps:
      - uses: actions/checkout@v4

      - name: Validate Azure OIDC configuration
        shell: bash
        run: |
          set -euo pipefail
          : "${AZURE_LOCATION:?Repository variable AZURE_LOCATION is required}"
          : "${AZURE_CLIENT_ID:?Repository variable AZURE_CLIENT_ID is required}"
          : "${AZURE_TENANT_ID:?Repository variable AZURE_TENANT_ID is required}"
          : "${AZURE_SUBSCRIPTION_ID:?Repository variable AZURE_SUBSCRIPTION_ID is required}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare run metadata and deployment parameters
        id: prepare
        shell: bash
        env:
          MANIFEST_PATH_INPUT: ${{ inputs.manifest_path }}
          RUNNER_IMAGE_TAG_INPUT: ${{ inputs.runner_image_tag }}
          SSH_PUBLIC_KEY_INPUT: ${{ inputs.ssh_public_key }}
          SSH_SOURCE_PREFIXES_INPUT: ${{ inputs.ssh_source_prefixes }}
          BLOCK_STORE_TARGET_INPUT: ${{ inputs.block_store_target }}
        run: |
          set -euo pipefail

          manifest_path="$MANIFEST_PATH_INPUT"
          if [[ ! -f "$manifest_path" ]]; then
            printf 'Manifest not found: %s\n' "$manifest_path" >&2
            exit 1
          fi

          ssh_prefixes_input="$SSH_SOURCE_PREFIXES_INPUT"
          block_store_target="$BLOCK_STORE_TARGET_INPUT"
          runner_image_tag="$RUNNER_IMAGE_TAG_INPUT"
          ssh_public_key="$SSH_PUBLIC_KEY_INPUT"

          if [[ ! "$runner_image_tag" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            printf 'runner_image_tag must be a valid Docker tag (1-128 chars: letters, digits, underscores, periods, or hyphens)\n' >&2
            exit 1
          fi

          runner_image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/lexonarchivebuilder-scale-test:${runner_image_tag}"

          manifest_json_minified="$(python3 - "$manifest_path" <<'PY'
          import json
          import re
          import sys

          with open(sys.argv[1], 'r', encoding='utf-8') as handle:
              data = json.load(handle)

          container_name = data.get('container_name')
          if not isinstance(container_name, str) or not container_name.strip():
              raise SystemExit('manifest must contain non-empty string field "container_name"')
          container_name = container_name.strip()
          if (
              len(container_name) < 3
              or len(container_name) > 63
              or not re.fullmatch(r'[a-z0-9](?:[a-z0-9-]{1,61}[a-z0-9])?', container_name)
          ):
              raise SystemExit(
                  'manifest field "container_name" must be a valid Azure Blob container name '
                  '(3-63 lowercase alphanumeric characters or hyphens, starting and ending with an alphanumeric character)'
              )
          data['container_name'] = container_name

          if not isinstance(data.get('sources'), list) or not data['sources']:
              raise SystemExit('manifest must contain non-empty array field "sources"')
          normalized_sources = []
          for source in data['sources']:
              if not isinstance(source, str) or not source.strip():
                  raise SystemExit('manifest sources must be non-empty strings')
              normalized_sources.append(source.strip())
          data['sources'] = normalized_sources

          print(json.dumps(data, separators=(',', ':'), sort_keys=True))
          PY
          )"
          manifest_hash="$(printf '%s' "$manifest_json_minified" | sha256sum | cut -c1-10)"
          repo_hash="$(printf '%s' "$GITHUB_REPOSITORY" | sha256sum | cut -c1-6)"
          container_name="$(python3 - "$manifest_path" <<'PY'
          import json
          import sys

          with open(sys.argv[1], 'r', encoding='utf-8') as handle:
              print(json.load(handle)['container_name'].strip())
          PY
          )"

          resource_group="lexon-exp-${manifest_hash}"
          storage_account_name="lex${repo_hash}${manifest_hash}sa"
          vnet_name="lexon-exp-${manifest_hash}-vnet"
          vm_name="lexon-exp-embed-${manifest_hash}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          run_name="embed-${manifest_hash}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          artifact_prefix="artifacts/embedding-refresh/${run_name}"
          dataset_block_store_prefix="datasets/block-store"
          dataset_replay_journal_prefix="datasets/block-store.replay-journal"
          manifest_json_b64="$(printf '%s' "$manifest_json_minified" | base64 -w0)"
          workload_script_path='infra/azure/experiments/embedding-refresh-bootstrap.sh'

          enable_ssh_access=false
          ssh_prefixes_json='[]'
          if [[ -n "$ssh_prefixes_input" ]]; then
            enable_ssh_access=true
            if [[ -z "$ssh_public_key" ]]; then
              printf 'ssh_public_key is required when ssh_source_prefixes enables SSH access\n' >&2
              exit 1
            fi
            ssh_prefixes_json="$(python3 - "$ssh_prefixes_input" <<'PY'
            import ipaddress
            import json
            import sys

            raw = sys.argv[1]
            items = [entry.strip() for entry in raw.split(',') if entry.strip()]
            if not items:
                raise SystemExit('ssh_source_prefixes must contain at least one CIDR when SSH access is enabled')

            validated = []
            for entry in items:
                if '/' not in entry:
                    raise SystemExit(f'ssh_source_prefixes entry "{entry}" must use CIDR notation')
                try:
                    validated.append(str(ipaddress.ip_network(entry, strict=False)))
                except ValueError as exc:
                    raise SystemExit(f'ssh_source_prefixes entry "{entry}" is not a valid CIDR: {exc}')

            print(json.dumps(validated))
          PY
            )"
          elif [[ -z "$ssh_public_key" ]]; then
            ssh_key_path="${RUNNER_TEMP}/lexonarchivebuilder-embedding-refresh-ssh-key"
            rm -f "$ssh_key_path" "$ssh_key_path.pub"
            ssh-keygen -q -t rsa -b 4096 -N '' -f "$ssh_key_path" >/dev/null
            ssh_public_key="$(<"${ssh_key_path}.pub")"
            rm -f "$ssh_key_path" "$ssh_key_path.pub"
          fi

          sas_expiry="$(date -u -d '+1 day' '+%Y-%m-%dT%H:%M:%SZ')"

          workload_env_file="$(
            printf "%s\n" \
              "RUN_NAME='${run_name}'" \
              "RUNNER_IMAGE='${runner_image}'" \
              "STAPI_IMAGE='${STAPI_IMAGE}'" \
              "MANIFEST_JSON_B64='${manifest_json_b64}'" \
              "DATASET_BLOCK_STORE_PREFIX='${dataset_block_store_prefix}'" \
              "DATASET_REPLAY_JOURNAL_PREFIX='${dataset_replay_journal_prefix}'" \
              "ARTIFACT_PREFIX='${artifact_prefix}'" \
              "BLOCK_STORE_TARGET='${block_store_target}'"
          )"

          python3 - "$container_name" "$storage_account_name" "$resource_group" "$vnet_name" "$vm_name" "$sas_expiry" "$ssh_public_key" "$enable_ssh_access" "$ssh_prefixes_json" "$workload_env_file" "$workload_script_path" > deployment.parameters.json <<'PY'
          import json
          import os
          import pathlib
          import sys

          (container_name, storage_account_name, resource_group, vnet_name, vm_name,
           sas_expiry, ssh_public_key, enable_ssh_access, ssh_prefixes_json,
           workload_env_file, workload_script_path) = sys.argv[1:12]

          workload_script = pathlib.Path(workload_script_path).read_text(encoding='utf-8')

          params = {
              "$schema": "https://schema.management.azure.com/schemas/2019-04-01/deploymentParameters.json#",
              "contentVersion": "1.0.0.0",
              "parameters": {
                  "location": {"value": os.environ["AZURE_LOCATION"]},
                  "vnetName": {"value": vnet_name},
                  "storageAccountName": {"value": storage_account_name},
                  "containerName": {"value": container_name},
                  "sasExpiry": {"value": sas_expiry},
                  "vmName": {"value": vm_name},
                  "sshPublicKey": {"value": ssh_public_key},
                  "enablePublicIp": {"value": enable_ssh_access.lower() == "true"},
                  "enableSshAccess": {"value": enable_ssh_access.lower() == "true"},
                  "sshSourcePrefixes": {"value": json.loads(ssh_prefixes_json)},
                  "workloadEnvironmentFile": {"value": workload_env_file},
                  "workloadScript": {"value": workload_script},
                  "tags": {
                      "value": {
                          "lexon-workflow": "embedding-refresh",
                          "lexon-manifest": resource_group,
                          "github-run-id": os.environ["GITHUB_RUN_ID"],
                          "github-run-attempt": os.environ["GITHUB_RUN_ATTEMPT"],
                      }
                  },
              },
          }

          json.dump(params, sys.stdout, indent=2)
          PY

          {
            echo "manifest_path=$manifest_path"
            echo "resource_group=$resource_group"
            echo "storage_account_name=$storage_account_name"
            echo "container_name=$container_name"
            echo "vnet_name=$vnet_name"
            echo "vm_name=$vm_name"
            echo "run_name=$run_name"
            echo "artifact_prefix=$artifact_prefix"
          } >>"$GITHUB_OUTPUT"

      - name: Ensure resource group exists
        shell: bash
        run: |
          set -euo pipefail
          az group create \
            --name '${{ steps.prepare.outputs.resource_group }}' \
            --location "$AZURE_LOCATION" \
            --tags lexon-workflow=embedding-refresh github-run-id="${GITHUB_RUN_ID}" github-run-attempt="${GITHUB_RUN_ATTEMPT}" >/dev/null

      - name: Deploy experiment runner
        id: deploy
        shell: bash
        run: |
          set -euo pipefail
          outputs_json="$(
            az deployment group create \
              --resource-group '${{ steps.prepare.outputs.resource_group }}' \
              --template-file infra/azure/experiments/main.bicep \
              --parameters @deployment.parameters.json \
              --query properties.outputs \
              --output json
          )"

          python3 - "$outputs_json" >>"$GITHUB_OUTPUT" <<'PY'
          import json
          import sys

          outputs = json.loads(sys.argv[1])
          for key in ("blobEndpoint", "storageAccountName", "containerName", "vmName", "vmPublicIpAddress"):
              value = outputs[key]["value"]
              print(f"{key}={value}")
          PY

      - name: Generate workflow container SAS
        shell: bash
        run: |
          set -euo pipefail
          sas_expiry="$(date -u -d '+1 day' '+%Y-%m-%dT%H:%M:%SZ')"
          account_key="$(
            az storage account keys list \
              --resource-group '${{ steps.prepare.outputs.resource_group }}' \
              --account-name '${{ steps.deploy.outputs.storageAccountName }}' \
              --query '[0].value' \
              --output tsv
          )"
          sas_token="$(
            az storage container generate-sas \
              --account-name '${{ steps.deploy.outputs.storageAccountName }}' \
              --name '${{ steps.deploy.outputs.containerName }}' \
              --permissions racwl \
              --expiry "$sas_expiry" \
              --https-only \
              --account-key "$account_key" \
              --output tsv
          )"
          container_sas_url="${{ steps.deploy.outputs.blobEndpoint }}${{ steps.deploy.outputs.containerName }}?${sas_token}"
          printf '::add-mask::%s\n' "$account_key"
          printf '::add-mask::%s\n' "$sas_token"
          printf '::add-mask::%s\n' "$container_sas_url"
          printf 'CONTAINER_SAS_URL=%s\n' "$container_sas_url" >>"$GITHUB_ENV"

      - name: Wait for status artifact
        id: wait
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p embedding-refresh-artifact

          status_url="$(python3 - "$CONTAINER_SAS_URL" '${{ steps.prepare.outputs.artifact_prefix }}/status.json' <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit

          container_sas_url, blob_path = sys.argv[1:3]
          parts = urlsplit(container_sas_url)
          path = f"{parts.path.rstrip('/')}/{blob_path.lstrip('/')}"
          print(urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"

          for _ in $(seq 1 220); do
            if curl --fail --silent --show-error --location "$status_url" --output embedding-refresh-artifact/status.json; then
              break
            fi
            sleep 60
          done

          if [[ ! -f embedding-refresh-artifact/status.json ]]; then
            printf 'Timed out waiting for embedding refresh status artifact\n' >&2
            exit 1
          fi

          summary_url="$(python3 - "$CONTAINER_SAS_URL" '${{ steps.prepare.outputs.artifact_prefix }}/summary.json' <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit
          parts = urlsplit(sys.argv[1])
          path = f"{parts.path.rstrip('/')}/{sys.argv[2].lstrip('/')}"
          print(urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"
          manifest_url="$(python3 - "$CONTAINER_SAS_URL" '${{ steps.prepare.outputs.artifact_prefix }}/manifest.json' <<'PY'
          import sys
          from urllib.parse import urlsplit, urlunsplit
          parts = urlsplit(sys.argv[1])
          path = f"{parts.path.rstrip('/')}/{sys.argv[2].lstrip('/')}"
          print(urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"

          curl --fail --silent --show-error --location "$summary_url" --output embedding-refresh-artifact/summary.json || true
          curl --fail --silent --show-error --location "$manifest_url" --output embedding-refresh-artifact/manifest.json || true

          success_flag="$(python3 - embedding-refresh-artifact/status.json <<'PY'
          import json
          import sys
          with open(sys.argv[1], 'r', encoding='utf-8') as handle:
              print('true' if json.load(handle).get('success') else 'false')
          PY
          )"

          echo "success=$success_flag" >>"$GITHUB_OUTPUT"
          if [[ "$success_flag" != 'true' ]]; then
            printf 'Embedding refresh reported failure\n' >&2
            exit 1
          fi

      - name: Always deallocate VM
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          az vm deallocate \
            --resource-group '${{ steps.prepare.outputs.resource_group }}' \
            --name '${{ steps.prepare.outputs.vm_name }}' \
            --no-wait >/dev/null 2>&1 || true

      - name: Upload embedding refresh artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: embedding-refresh-${{ steps.prepare.outputs.run_name }}
          path: embedding-refresh-artifact
          if-no-files-found: warn

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo '## Embedding refresh'
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Manifest | \`${{ steps.prepare.outputs.manifest_path }}\` |"
            echo "| Resource group | \`${{ steps.prepare.outputs.resource_group }}\` |"
            echo "| Storage account | \`${{ steps.deploy.outputs.storageAccountName }}\` |"
            echo "| Container | \`${{ steps.deploy.outputs.containerName }}\` |"
            echo "| VM | \`${{ steps.deploy.outputs.vmName }}\` |"
            echo "| Public IP | \`${{ steps.deploy.outputs.vmPublicIpAddress }}\` |"
            echo "| Run name | \`${{ steps.prepare.outputs.run_name }}\` |"
            echo "| Artifact prefix | \`${{ steps.prepare.outputs.artifact_prefix }}\` |"
          } >>"$GITHUB_STEP_SUMMARY"
